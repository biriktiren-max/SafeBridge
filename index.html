<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge V9.0 PRO - KARA KUTU SÜRÜMÜ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 550px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 25px;
        }
        h3 {
            color: #ffc107;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #bbb;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        .btn-connect {
            background-color: #28a745;
            color: white;
        }
        .btn-connect:hover { background-color: #218838; }
        .btn-action {
            background-color: #007bff;
            color: white;
        }
        .btn-action:hover { background-color: #0069d9; }
        .btn-withdraw {
            background-color: #ffc107;
            color: #121212;
        }
        .btn-withdraw:hover { background-color: #e0a800; }
        .btn-query {
            background-color: #17a2b8;
            color: white;
        }
        .btn-query:hover { background-color: #138496; }
        
        /* KARA KUTU RAPORLAMA PANELLERİ SİSTEMİ */
        .log-box {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #bbb;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 20px;
            white-space: pre-wrap;
        }
        .report-panel {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            font-family: monospace;
        }
        .report-success {
            background-color: #0f3d1b;
            border: 1px solid #1e7e34;
            color: #72f28f;
        }
        .report-error {
            background-color: #3d0f11;
            border: 1px solid #bd2130;
            color: #f27279;
        }
        .report-link {
            color: #00ffff;
            text-decoration: underline;
            word-break: break-all;
        }
        .status-panel {
            background-color: #2a2a2a;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            margin-top: 10px;
            border-left: 4px solid #17a2b8;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SafeBridge V9.0 KARA KUTU</h2>
    
    <button id="connectButton" class="btn-connect" onclick="connectWallet()">1. CÜZDAN HATTINI BAĞLA</button>
    
    <div class="form-group">
        <label for="networkSelect">İşlem Yapılacak Blockchain Ağı</label>
        <select id="networkSelect" onchange="handleNetworkChange()">
            <option value="0x13882" selected>Polygon Amoy Testnet (USDT)</option>
            <option value="0x89">Polygon Mainnet (USDT)</option>
            <option value="0x38">BNB Smart Chain (USDT)</option>
        </select>
    </div>

    <h3>[ EMANET KASASINA USDT KİLİTLE ]</h3>
    <div class="form-group">
        <label for="aliciAdresi">Alıcı Adresi</label>
        <input type="text" id="aliciAdresi" placeholder="0x..." autocomplete="off">
    </div>
    
    <div class="form-group">
        <label id="miktarLabel" for="miktarInput">Gönderilecek Miktar (USDT)</label>
        <input type="text" id="miktarInput" value="10" placeholder="10">
    </div>
    
    <div class="form-group">
        <label for="sureInput">Emanet Süresi (Saniye Cinsinden)</label>
        <input type="text" id="sureInput" value="3600" placeholder="Örn: 3600 (1 Saat)">
    </div>
    
    <button class="btn-action" onclick="createTransaction()">2. BLOCKCHAIN KİLİDİNİ VUR</button>
    
    <h3>[ KASADAN PARAYI CÜZDANA ÇEK ]</h3>
    <div class="form-group">
        <label for="islemIdInput">Onaylanacak İşlem ID (Takip Numarası)</label>
        <input type="text" id="islemIdInput" placeholder="Örn: 0">
    </div>
    
    <button class="btn-withdraw" onclick="completeTransaction()">3. ALICI OLARAK ONAYLA VE MÜHRÜ VUR</button>
    
    <h3>[ BLOCKCHAIN KASA DURUMU SORGULA ]</h3>
    <div class="form-group">
        <label for="sorguIdInput">Sorgulanacak İşlem ID</label>
        <input type="text" id="sorguIdInput" placeholder="Örn: 0">
    </div>
    
    <button class="btn-query" onclick="checkTransactionStatus()">KASA DURUMUNU CANLI SORGULA</button>
    
    <div id="sorguSonuc" class="status-panel" style="display: none;"></div>
    
    <div id="raporPaneli" class="report-panel"></div>
    
    <div id="logKutusu" class="log-box">[SİSTEM] > Raporlama ve arıza tespit modülü montaja hazır abi.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js" type="text/javascript"></script>

<script>
    const rawContractAddress = "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A"; 
    
    const contractABI = [
        "function emanetOlustur(address _alici, uint256 _miktar, uint256 _sureSaniye) external",
        "function aliciOnayVer(uint256 _id) external",
        "function otonomIadeTetikle(uint256 _id) external",
        "function islemler(uint256 id) external view returns (address, address, uint256, uint256, bool, bool)"
    ];

    const contractAddresses = {
        "0x13882": rawContractAddress, "0x89": rawContractAddress, "0x38": rawContractAddress
    };

    let provider;
    let signer;
    let contract;

    function handleNetworkChange() {
        logMesaji(`Sistem otonom USDT modunda hazır abi.`);
    }

    // OTONOM ARIZA VE İŞLEM RAPORU JENERATÖRÜ
    function raporOlustur(durum, baslik, detaylar = {}) {
        const panel = document.getElementById("raporPaneli");
        panel.style.display = "block";
        panel.className = `report-panel ${durum === 'BAŞARILI' ? 'report-success' : 'report-error'}`;
        
        let icerik = `<strong>🚨 [KARA KUTU SİSTEM RAPORU]</strong><br>`;
        icerik += `<strong>DURUM:</strong> ${durum}<br>`;
        icerik += `<strong>MESAJ:</strong> ${baslik}<br>`;
        
        for (const [key, val] of Object.entries(detaylar)) {
            icerik += `<strong>${key}:</strong> ${val}<br>`;
        }
        
        panel.innerHTML = icerik;
    }

    // ARIZA AYRIŞTIRMA MOTORU (Gelen karmaşık hata kodlarını Türkçe işçi diline çevirir abi)
    function arizaCozumle(error, islemTipi) {
        let baslik = "Bilinmeyen Blockchain Hatası";
        let detaylar = { "Hata Kodu": "GİZLİ_KAÇAK" };

        if (!error) return { baslik, detaylar };

        const errorString = error.toString().toLowerCase();
        const errorMessage = error.message ? error.message.toLowerCase() : "";

        if (errorString.includes("user rejected") || errorMessage.includes("user rejected")) {
            baslik = "Kullanıcı Onay İptali";
            detaylar = { "Açıklama": "MetaMask penceresinden işlemi reddettiniz abi. Para hattı kesildi." };
        } else if (errorString.includes("insufficient funds") || errorMessage.includes("insufficient funds")) {
            baslik = "Yetersiz Gas Bakiyesi (POL/MATIC)";
        } else if (errorString.includes("insufficient") || errorMessage.includes("insufficient")) {
            baslik = "Yetersiz USDT Bakiyesi";
        } else if (errorString.includes("gas limit") || errorString.includes("transaction execution reverted")) {
            baslik = "Sözleşme Kural İhlali (Revert)";
        } else if (!window.ethereum) {
            baslik = "MetaMask Bağlantısı Yok";
        }

        if (error.code) detaylar["Hata Kodu"] = error.code;
        if (error.action) detaylar["Tetiklenen Vites"] = error.action;
        
        raporOlustur("ARIZA/HATA", baslik, detaylar);
    }

    async function switchNetwork(targetChainId) {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: targetChainId }],
            });
            return true;
        } catch (switchError) {
            arizaCozumle(switchError, "Ağ Değiştirme");
            return false;
        }
    }

    async function connectWallet() {
        document.getElementById("raporPaneli").style.display = "none";
        if (typeof window.ethereum !== 'undefined') {
            try {
                const targetChainId = document.getElementById('networkSelect').value;
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

                if (currentChainId !== targetChainId) {
                    const success = await switchNetwork(targetChainId);
                    if (!success) return; 
                }

                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                
                const activeContractAddress = contractAddresses[targetChainId];
                const temizKontratAdresi = ethers.getAddress(activeContractAddress.toLowerCase());
                contract = new ethers.Contract(temizKontratAdresi, contractABI, signer);
                
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerText = `HAT BAĞLANDI: ${signer.address.substring(0, 6).toUpperCase()}...`;
                connectBtn.style.backgroundColor = '#28a745';
                
                logMesaji(`Cüzdan hattı başarıyla bağlandı abi.`);
            } catch (error) {
                arizaCozumle(error, "Cüzdan Bağlantısı");
            }
        } else {
            raporOlustur("ARIZA/HATA", "MetaMask Bulunamadı", { "Çözüm": "Lütfen tarayıcınıza MetaMask eklentisini kurun abi." });
        }
    }

    if (typeof window.ethereum !== 'undefined') {
        window.ethereum.on('chainChanged', (chainId) => {
            logMesaji("Cüzdandan ağ değişti, vites tazeleniyor...");
            connectWallet();
        });
    }

    async function createTransaction() {
        document.getElementById("raporPaneli").style.display = "none";
        logMesaji("Emanet kaydı hazırlanıyor...");
        try {
            const aliciRaw = document.getElementById('aliciAdresi').value.trim();
            let miktarRaw = document.getElementById('miktarInput').value.trim();
            const sureRaw = document.getElementById('sureInput').value.trim();

            miktarRaw = miktarRaw.replace(',', '.');
            if (!aliciRaw || !miktarRaw || isNaN(parseFloat(miktarRaw)) || !sureRaw || isNaN(parseInt(sureRaw))) {
                raporOlustur("ARIZA/HATA", "Eksik Form Girişi", { "Açıklama": "Lütfen alıcı adresi, miktar ve süreyi boş bırakmayın abi." });
                return;
            }

            const alici = ethers.getAddress(aliciRaw.toLowerCase());
            if (!signer || !contract) { 
                raporOlustur("ARIZA/HATA", "Cüzdan Hattı Bağlı Değil", { "Açıklama": "Lütfen önce 1 numaralı yeşil butona basarak cüzdanı bağlayın abi." });
                return; 
            }

            const miktarWei = ethers.parseUnits(miktarRaw, 6); 
            const sureSaniye = BigInt(sureRaw);

            logMesaji("MetaMask onay penceresi tetikleniyor...");
            
            const tx = await contract.emanetOlustur(alici, miktarWei, sureSaniye, {
                gasLimit: 300000,
                maxPriorityFeePerGas: ethers.parseUnits("40", "gwei"), 
                maxFeePerGas: ethers.parseUnits("50", "gwei")
            });
            
            logMesaji("Emanet blockchain ağına gönderildi! Onay bekleniyor...");
            const receipt = await tx.wait();
            
            logMesaji("BAŞARILI: Emanet kaydı blockchain kasasına kilitlendi abi!");
            
            // BAŞARILI İŞLEM RAPORU
            raporOlustur("BAŞARILI", "Emanet Kasası Kuruldu", {
                "İşlem Tipi": "Emanet Oluşturma",
                "Blok Numarası": receipt.blockNumber,
                "Harcanan Gas": receipt.gasUsed.toString(),
                "İşlem Linki": `<a class="report-link" href="https://amoy.polygonscan.com/tx/${tx.hash}" target="_blank">Polygonscan Üzerinde Gör</a>`
            });

        } catch (error) {
            arizaCozumle(error, "Emanet Oluşturma");
        }
    }

    async function completeTransaction() {
        document.getElementById("raporPaneli").style.display = "none";
        logMesaji("Alıcı onay işlemi başlatılıyor...");
        try {
            const islemId = document.getElementById('islemIdInput').value.trim();
            if (!islemId || isNaN(parseInt(islemId))) {
                raporOlustur("ARIZA/HATA", "Eksik İşlem Takip No", { "Açıklama": "Lütfen onaylamak istediğiniz İşlem ID numarasını yazın abi." });
                return;
            }
            if (!signer || !contract) { 
                raporOlustur("ARIZA/HATA", "Cüzdan Hattı Bağlı Değil", { "Açıklama": "Lütfen önce cüzdan hattını bağlayın abi." });
                return; 
            }

            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} onaylanıyor...`);
            
            const tx = await contract.aliciOnayVer(BigInt(islemId), {
                gasLimit: 250000,
                maxPriorityFeePerGas: ethers.parseUnits("40", "gwei"),
                maxFeePerGas: ethers.parseUnits("50", "gwei")
            });
            
            logMesaji("Onay talebi blockchain ağına gönderildi...");
            const receipt = await tx.wait();
            
            logMesaji("BAŞARILI: Alıcı onayı verildi, para hesaba aktarıldı abi!");
            
            // BAŞARILI ONAY RAPORU
            raporOlustur("BAŞARILI", "Mühür Vuruldu - Para Kilitleri Açıldı", {
                "İşlem Tipi": "Alıcı Onay Mekanizması",
                "Onaylanan ID": islemId,
                "Blok Numarası": receipt.blockNumber,
                "İşlem Linki": `<a class="report-link" href="https://amoy.polygonscan.com/tx/${tx.hash}" target="_blank">Polygonscan Üzerinde Gör</a>`
            });

        } catch (error) {
            arizaCozumle(error, "Alıcı Onay Verme");
        }
    }

    async function checkTransactionStatus() {
        document.getElementById("raporPaneli").style.display = "none";
        logMesaji("Blockchain ağından veri paketi çözülüyor...");
        try {
            const id = document.getElementById('sorguIdInput').value.trim();
            if (id === "" || isNaN(parseInt(id))) {
                raporOlustur("ARIZA/HATA", "Geçersiz Sorgu ID", { "Açıklama": "Lütfen sorgulamak istediğiniz rakamı girin abi." });
                return;
            }
            if (!contract) { 
                raporOlustur("ARIZA/HATA", "Cüzdan Bağlantısı Eksik", { "Açıklama": "Sorgu motorunun blockchain ile konuşabilmesi için cüzdanı bağlayın abi." });
                return; 
            }

            const txn = await contract.islemler(BigInt(id));
            const gonderen = String(txn[0]);
            const alici = String(txn[1]);
            const miktarWeiMetin = String(txn[2]);
            const bitisZamaniMetin = String(txn[3]);
            const tamamlandi = Boolean(txn[4]);
            const iadeEdildi = Boolean(txn[5]);

            if (gonderen === "0x0000000000000000000000000000000000000000" || gonderen === "undefined") {
                raporOlustur("ARIZA/HATA", "Blockchain Üzerinde Kayıt Yok", { "Sorgulanan ID": id, "Durum": "Bu numaraya ait bir kasa henüz kurulmamış abi." });
                return;
            }

            const miktarNormal = ethers.formatUnits(miktarWeiMetin, 6);
            const bitisZamani = Number(bitisZamaniMetin);
            const kalanSureSaniye = bitisZamani - Math.floor(Date.now() / 1000);
            
            let sureDurumu = "";
            if (tamamlandi || iadeEdildi) {
                sureDurumu = "Süreç Sonlandı";
            } else if (kalanSureSaniye > 0) {
                sureDurumu = `${Math.ceil(kalanSureSaniye / 60)} Dakika Kaldı`;
            } else {
                sureDurumu = "Süre Doldu (İadeye Hazır)";
            }

            let durumYazisi = "";
            if (tamamlandi) {
                durumYazisi = "TAMAMLANDI (Alıcı Çekti)";
            } else if (iadeEdildi) {
                durumYazisi = "İADE EDİLDİ (Geri Döndü)";
            } else {
                durumYazisi = "KASADA AKTİF (Onay Bekliyor)";
            }

            const sonucKutusu = document.getElementById('sorguSonuc');
            sonucKutusu.style.display = "block";
            sonucKutusu.innerHTML = `
                <strong style="color: #ffc107;">ID: ${id} Otonom Kasa Raporu:</strong><br>
                • Gönderen: ${gonderen.substring(0,8)}...${gonderen.substring(34)}<br>
                • Alıcı: ${alici.substring(0,8)}...${alici.substring(34)}<br>
                • Kilitli Tutar: <strong>${miktarNormal} USDT</strong><br>
                • Kalan Süre: <strong>${sureDurumu}</strong><br>
                • Güncel Durum: <strong>${durumYazisi}</strong>
            `;
            logMesaji(`ID: ${id} için otonom kasa verisi başarıyla çekildi abi.`);
        } catch (error) {
            arizaCozumle(error, "Canlı Veri Sorgulama");
        }
    }

    function logMesaji(mesaj) {
        const logKutusu = document.getElementById('logKutusu');
        const zaman = new Date().toLocaleTimeString('tr-TR');
        logKutusu.innerHTML += `<br>[${zaman}] > ${mesaj}`;
        logKutusu.scrollTop = logKutusu.scrollHeight;
    }
</script>

</body>
</html>
