
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge | Blockchain Escrow V3.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --main: #38bdf8; --bg: #0f172a; --card: #1e293b; --success: #10b981; --warning: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; color: var(--main); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        label { display: block; margin-top: 15px; font-size: 0.85rem; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--main); color: #0f172a; }
        .btn-green { background: var(--success); color: white; }
        .status-box { margin-top: 15px; padding: 15px; border-radius: 8px; background: #000; color: var(--warning); font-family: monospace; border-left: 4px solid var(--main); min-height: 90px; white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>SafeBridge <span style="color:var(--success)">V3.8</span></h1>
    <div class="grid">
        <div class="card">
            <h2>📦 Emanet Oluştur</h2>
            <button onclick="connectWallet()" class="btn-blue" id="connBtn">1. Cüzdanı Bağla</button>
            <label>Alıcı Adresi:</label>
            <input type="text" id="receiver" placeholder="0x...">
            <label>Birim:</label>
            <select id="currency"><option value="ETH">Sepolia ETH</option></select>
            <label>Miktar (Nokta kullanın):</label>
            <input type="text" id="amount" value="0.01">
            <label>Şifre:</label>
            <input type="text" id="lockPass" placeholder="Örn: 1234">
            <button onclick="createEscrow()" class="btn-blue" style="margin-top:20px;">Parayı Kilitle ve Gönder</button>
        </div>

        <div class="card">
            <h2>🔓 Emaneti Geri Al</h2>
            <label>İşlem ID:</label>
            <input type="number" id="targetId" placeholder="Örn: 0">
            <button onclick="checkEscrowStatus()" class="btn-blue" style="background:#475569">⌛ DURUMU SORGULA</button>
            <label style="margin-top:20px;">Kilit Açma Şifresi:</label>
            <input type="text" id="unlockPass">
            <button onclick="withdrawFunds()" class="btn-green">Cüzdanıma Çek (Withdraw)</button>
            <div id="logBox" class="status-box">> Hazırız İsmail abi...</div>
        </div>
    </div>
</div>

<script>
    const contractAddress = "0x53805B737A4358607A6679549fC6D68644e5f762";
    const abi = [
        "function createTransaction(address _receiver, bytes32 _passwordHash, uint256 _unlockTime) public payable",
        "function completeTransaction(uint256 _id, string memory _password) public",
        "function transactions(uint256) public view returns (address sender, address receiver, uint256 amount, bytes32 passwordHash, uint256 unlockTime, bool completed, bool refunded)"
    ];

    let signer;
    function updateLog(msg) { document.getElementById('logBox').innerText = "> " + msg; }

    async function connectWallet() {
        if (!window.ethereum) return alert("MetaMask yok!");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const network = await provider.getNetwork();
        if (network.chainId !== 11155111) {
            updateLog("HATA: MetaMask'tan SEPOLIA ağını seçin!");
            return;
        }
        signer = provider.getSigner();
        updateLog("Bağlantı kuruldu abi.");
        document.getElementById('connBtn').innerText = "✅ Bağlı";
        document.getElementById('receiver').value = await signer.getAddress();
    }

    async function createEscrow() {
        if (!signer) return updateLog("Önce bağlan abi!");
        try {
            const contract = new ethers.Contract(contractAddress, abi, signer);
            
            // CHECKSUM TAMİRCİSİ: Adresi otomatik formatlar
            let rawAddr = document.getElementById('receiver').value.trim();
            const receiver = ethers.utils.getAddress(rawAddr); 
            
            let amountStr = document.getElementById('amount').value.replace(',', '.');
            const pass = document.getElementById('lockPass').value.trim();

            updateLog("Onay Bekleniyor...");
            const tx = await contract.createTransaction(
                receiver,
                ethers.utils.keccak256(ethers.utils.toUtf8Bytes(pass)),
                Math.floor(Date.now() / 1000) + 60,
                { value: ethers.utils.parseEther(amountStr) }
            );
            updateLog("İşlem blokzincirine gönderildi...");
            await tx.wait();
            updateLog("BAŞARILI! Para kilitlendi abi.");
        } catch (e) { 
            console.error(e);
            updateLog("HATA: " + (e.reason || "Adres/Miktar hatası. Nokta kullandığından emin ol.")); 
        }
    }

    async function checkEscrowStatus() {
        const id = document.getElementById('targetId').value;
        const prov = new ethers.providers.Web3Provider(window.ethereum);
        const contract = new ethers.Contract(contractAddress, abi, prov);
        try {
            const tx = await contract.transactions(id);
            updateLog("ID " + id + ": " + ethers.utils.formatEther(tx.amount) + " ETH kilitli.");
        } catch (e) { updateLog("İşlem bulunamadı."); }
    }

    async function withdrawFunds() {
        if (!signer) return;
        try {
            const contract = new ethers.Contract(contractAddress, abi, signer);
            const id = document.getElementById('targetId').value;
            const pass = document.getElementById('unlockPass').value.trim();
            const tx = await contract.completeTransaction(id, pass);
            await tx.wait();
            updateLog("BAŞARILI! Para cüzdanına geçti.");
        } catch (e) { updateLog("HATA: Şifre yanlış!"); }
    }
</script>
</body>
</html>
