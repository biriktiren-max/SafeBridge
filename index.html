<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge V6.2 MULTI-CHAIN SORGULU</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 25px;
        }
        h3 {
            color: #ffc107;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #bbb;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        .btn-connect {
            background-color: #28a745;
            color: white;
        }
        .btn-connect:hover { background-color: #218838; }
        .btn-action {
            background-color: #007bff;
            color: white;
        }
        .btn-action:hover { background-color: #0069d9; }
        .btn-withdraw {
            background-color: #ffc107;
            color: #121212;
        }
        .btn-withdraw:hover { background-color: #e0a800; }
        .btn-query {
            background-color: #17a2b8;
            color: white;
        }
        .btn-query:hover { background-color: #138496; }
        .log-box {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #ff3333;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 20px;
            white-space: pre-wrap;
        }
        .log-box .info { color: #00ff00; }
        .status-panel {
            background-color: #2a2a2a;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            margin-top: 10px;
            border-left: 4px solid #17a2b8;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SafeBridge V6.2 PRO</h2>
    
    <button id="connectButton" class="btn-connect" onclick="connectWallet()">1. CÜZDAN HATTINI BAĞLA</button>
    
    <div class="form-group">
        <label for="networkSelect">İşlem Yapılacak Ağ ve Değer Çeşidi</label>
        <select id="networkSelect" onchange="handleNetworkChange()">
            <option value="0x13882" selected>Polygon Amoy Testnet (POL)</option>
            <option value="0x89">Polygon Mainnet (POL)</option>
            <option value="0x1">Ethereum Mainnet (ETH)</option>
            <option value="0x38">BNB Smart Chain (BNB)</option>
            <option value="0xa86a">Avalanche C-Chain (AVAX)</option>
            <option value="0xa4b1">Arbitrum One (ETH)</option>
        </select>
    </div>

    <h3>[ EMANET KASASINA PARA KİLİTLE ]</h3>
    <div class="form-group">
        <label for="aliciAdresi">Alıcı Adresi</label>
        <input type="text" id="aliciAdresi" placeholder="0x..." autocomplete="off">
    </div>
    
    <div class="form-group">
        <label id="miktarLabel" for="miktarInput">Gönderilecek Miktar (POL)</label>
        <input type="text" id="miktarInput" value="0.001" placeholder="0.001">
    </div>
    
    <div class="form-group">
        <label for="guvenlikSifresi">Güvenlik Şifresi (Kasa Kilitleme Şifresi)</label>
        <input type="password" id="guvenlikSifresi" placeholder="••••••••">
    </div>
    
    <button class="btn-action" onclick="createTransaction()">2. BLOCKCHAIN KİLİDİNİ VUR</button>
    
    <h3>[ KASADAN PARAYI CÜZDANA ÇEK ]</h3>
    <div class="form-group">
        <label for="islemIdInput">İşlem Takip Numarası (ID)</label>
        <input type="text" id="islemIdInput" placeholder="Örn: 1">
    </div>
    
    <div class="form-group">
        <label for="cozmeSifresiInput">Kilit Açma Şifresi</label>
        <input type="password" id="cozmeSifresiInput" placeholder="••••••••">
    </div>
    
    <button class="btn-withdraw" onclick="completeTransaction()">3. PARAYI CÜZDANA ÇEK</button>
    
    <h3>[ BLOCKCHAIN KASA DURUMU SORGULA ]</h3>
    <div class="form-group">
        <label for="sorguIdInput">Sorgulanacak İşlem ID</label>
        <input type="text" id="sorguIdInput" placeholder="Örn: 1">
    </div>
    
    <button class="btn-query" onclick="checkTransactionStatus()">KASA DURUMUNU CANLI SORGULA</button>
    
    <div id="sorguSonuc" class="status-panel" style="display: none;"></div>
    
    <div id="logKutusu" class="log-box">[12:00:00] > Sistem sorgu mekanizmasına hazır abi.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>

<script>
    const rawContractAddress = "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A"; 
    
    const contractABI = [
        "function createTransaction(address _receiver, bytes32 _passwordHash) public payable",
        "function completeTransaction(uint256 _id, string memory _password) public",
        // YENİ ELEMAN: Sözleşmedeki verileri okumamızı sağlayan view fonksiyonu
        "function getTransactionDetails(uint256 _id) public view returns (address, address, uint256, bool)"
    ];

    const networkSymbols = {
        "0x13882": "POL", "0x89": "POL", "0x1": "ETH", "0x38": "BNB", "0xa86a": "AVAX", "0xa4b1": "ETH"
    };

    const contractAddresses = {
        "0x13882": rawContractAddress, "0x89": rawContractAddress, "0x1": rawContractAddress, 
        "0x38": rawContractAddress, "0xa86a": rawContractAddress, "0xa4b1": rawContractAddress
    };

    let provider;
    let signer;
    let contract;

    function handleNetworkChange() {
        const selectedNetwork = document.getElementById('networkSelect').value;
        const symbol = networkSymbols[selectedNetwork];
        document.getElementById('miktarLabel').innerText = `Gönderilecek Miktar (${symbol})`;
        document.getElementById('miktarInput').placeholder = `0.001 ${symbol}`;
        logMesaji(`Değer çeşidi vitesi değiştirildi: ${symbol} moduna geçildi abi.`, true);
    }

    async function switchNetwork(targetChainId) {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: targetChainId }],
            });
            logMesaji("MetaMask başarıyla seçilen ağa geçiş yaptı abi.", true);
            return true;
        } catch (switchError) {
            if (switchError.code === 4902) {
                logMesaji("Seçilen ağ cüzdanda ekli değil abi.");
            } else {
                logMesaji("Ağ değiştirme talebi cüzdan tarafından reddedildi.");
            }
            return false;
        }
    }

    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const targetChainId = document.getElementById('networkSelect').value;
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

                if (currentChainId !== targetChainId) {
                    logMesaji("Cüzdan ağı ile seçilen değer uyuşmuyor! Ağ değiştiriliyor...", true);
                    const success = await switchNetwork(targetChainId);
                    if (!success) return; 
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const walletAddress = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                
                const activeContractAddress = contractAddresses[targetChainId];
                const temizKontratAdresi = ethers.utils.getAddress(activeContractAddress.toLowerCase());
                contract = new ethers.Contract(temizKontratAdresi, contractABI, signer);
                
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerText = `HAT BAĞLANDI: ${walletAddress.substring(0, 6).toUpperCase()}...`;
                connectBtn.style.backgroundColor = '#28a745';
                
                logMesaji(`Hattınız bağlandı. Aktif Birim: ${networkSymbols[targetChainId]} abi.`, true);
            } catch (error) {
                logMesaji("Cüzdan bağlantısı koptu veya reddedildi abi.");
                console.error(error);
            }
        } else {
            logMesaji("MetaMask bulunamadı, eklentiyi kontrol et abi.");
        }
    }

    if (typeof window.ethereum !== 'undefined') {
        window.ethereum.on('chainChanged', (chainId) => {
            logMesaji("Cüzdandan ağ değişti, sistem vites tazeledi...", true);
            const select = document.getElementById('networkSelect');
            if([...select.options].some(option => option.value === chainId)) {
                select.value = chainId;
                handleNetworkChange();
            }
            connectWallet();
        });
    }

    async function createTransaction() {
        logMesaji("İşlem başlatılıyor, veriler kontrol ediliyor...", true);
        try {
            const aliciRaw = document.getElementById('aliciAdresi').value.trim();
            let miktarRaw = document.getElementById('miktarInput').value.trim();
            const sifre = document.getElementById('guvenlikSifresi').value;

            miktarRaw = miktarRaw.replace(',', '.');
            if (!aliciRaw || !miktarRaw || isNaN(parseFloat(miktarRaw)) || parseFloat(miktarRaw) <= 0 || !sifre) {
                logMesaji("İŞLEM İPTAL: Lütfen tüm alanları eksiksiz ve doğru doldur abi.");
                return;
            }

            const alici = ethers.utils.getAddress(aliciRaw.toLowerCase());
            if (!signer || !contract) { logMesaji("İŞLEM İPTAL: Önce cüzdan hattını bağla abi."); return; }

            const gonderen = await signer.getAddress();
            if (gonderen.toLowerCase() === alici.toLowerCase()) {
                logMesaji("İŞLEM İPTAL: Alıcı adresi olarak kendi adresini yazamazsın abi.");
                return;
            }

            const passwordHash = ethers.utils.keccak256(ethers.utils.toUtf8Bytes(sifre));
            const miktarWei = ethers.utils.parseEther(miktarRaw);

            logMesaji("MetaMask onay penceresi tetikleniyor, sağ paneli kontrol et abi...", true);
            const tx = await contract.createTransaction(alici, passwordHash, { value: miktarWei });
            logMesaji("İşlem blockchain ağına gönderildi! Onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: 2. Blockchain kilidi vuruldu, para kasaya kilitlendi abi!", true);
        } catch (error) {
            console.error(error);
            logMesaji("TEKNİK ARIZA: " + (error.message ? error.message.substring(0, 90) : "Hata") + "...");
        }
    }

    async function completeTransaction() {
        logMesaji("Para çekme talebi hazırlanıyor...", true);
        try {
            const islemId = document.getElementById('islemIdInput').value.trim();
            const cozmeSifresi = document.getElementById('cozmeSifresiInput').value;

            if (!islemId || isNaN(parseInt(islemId)) || !cozmeSifresi) {
                logMesaji("İŞLEM İPTAL: İşlem ID'sini ve Kilit Açma Şifresini gir abi.");
                return;
            }
            if (!signer || !contract) { logMesaji("İŞLEM İPTAL: Önce cüzdan hattını bağlamalısın abi."); return; }

            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} için şifre doğrulanıyor...`, true);
            const tx = await contract.completeTransaction(parseInt(islemId), cozmeSifresi);
            logMesaji("Kilit açma talebi ağa gönderildi, onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: Kilit açıldı! Para alıcının cüzdanına tık diye aktarıldı abi!", true);
        } catch (error) {
            console.error(error);
            logMesaji("TEKNİK ARIZA: " + (error.message ? error.message.substring(0, 90) : "Hata") + "...");
        }
    }

    // YENİ FONKSİYON: SORGULAMA MOTORU
    async function checkTransactionStatus() {
        logMesaji("Ağdan kasa detayları sorgulanıyor...", true);
        try {
            const id = document.getElementById('sorguIdInput').value.trim();
            if (!id || isNaN(parseInt(id))) {
                logMesaji("İŞLEM İPTAL: Geçerli bir İşlem ID girin abi.");
                return;
            }
            if (!contract) {
                logMesaji("İŞLEM İPTAL: Önce yukarıdan cüzdan hattını bağlamalısın abi.");
                return;
            }

            // Sözleşmeden verileri gas ücreti ödemeden okuyoruz
            const txn = await contract.getTransactionDetails(parseInt(id));
            
            const gonderen = txn[0];
            const alici = txn[1];
            const miktarWei = txn[2];
            const tamamlandiMi = txn[3];

            const miktarNormal = ethers.utils.formatEther(miktarWei);
            const aktifAg = document.getElementById('networkSelect').value;
            const paraBirimi = networkSymbols[aktifAg] || "Birim";

            const sonucKutusu = document.getElementById('sorguSonuc');
            sonucKutusu.style.display = "block";
            sonucKutusu.innerHTML = `
                <strong style="color: #ffc107;">ID: ${id} Kasa Durum Raporu:</strong><br>
                • Gönderen: ${gonderen.substring(0,8)}...${gonderen.substring(34)}<br>
                • Alıcı: ${alici.substring(0,8)}...${alici.substring(34)}<br>
                • Kilitli Miktar: <strong>${miktarNormal} ${paraBirimi}</strong><br>
                • Durum: ${tamamlandiMi ? '<span style="color:#00ff00; font-weight:bold;">KİLİT ÇÖZÜLDÜ (Aktarıldı)</span>' : '<span style="color:#ff3333; font-weight:bold;">KİLİTLİ (Kasada Bekliyor)</span>'}
            `;
            logMesaji(`ID: ${id} için canlı veri başarıyla ekrana basıldı abi.`, true);
        } catch (error) {
            console.error(error);
            logMesaji("SORGULAMA HATASI: Bu ID numarası blockchain ağında eşleşmedi abi.");
        }
    }

    function logMesaji(mesaj, isInfo = false) {
        const logKutusu = document.getElementById('logKutusu');
        const zaman = new Date().toLocaleTimeString('tr-TR');
        const classStyle = isInfo ? 'class="info"' : '';
        logKutusu.innerHTML += `<br><span ${classStyle}>[${zaman}] > ${mesaj}</span>`;
        logKutusu.scrollTop = logKutusu.scrollHeight;
    }
</script>

</body>
</html>
