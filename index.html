<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge V7.4 KESİN STABİLİZASYON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 25px;
        }
        h3 {
            color: #ffc107;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #bbb;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        .btn-connect {
            background-color: #28a745;
            color: white;
        }
        .btn-connect:hover { background-color: #218838; }
        .btn-action {
            background-color: #007bff;
            color: white;
        }
        .btn-action:hover { background-color: #0069d9; }
        .btn-withdraw {
            background-color: #ffc107;
            color: #121212;
        }
        .btn-withdraw:hover { background-color: #e0a800; }
        .btn-query {
            background-color: #17a2b8;
            color: white;
        }
        .btn-query:hover { background-color: #138496; }
        .log-box {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #ff3333;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 20px;
            white-space: pre-wrap;
        }
        .log-box .info { color: #00ff00; }
        .status-panel {
            background-color: #2a2a2a;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            margin-top: 10px;
            border-left: 4px solid #17a2b8;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SafeBridge V7.4 PRO</h2>
    
    <button id="connectButton" class="btn-connect" onclick="connectWallet()">1. CÜZDAN HATTINI BAĞLA</button>
    
    <div class="form-group">
        <label for="networkSelect">İşlem Yapılacak Blockchain Ağı</label>
        <select id="networkSelect" onchange="handleNetworkChange()">
            <option value="0x13882" selected>Polygon Amoy Testnet (USDT)</option>
            <option value="0x89">Polygon Mainnet (USDT)</option>
            <option value="0x38">BNB Smart Chain (USDT)</option>
        </select>
    </div>

    <h3>[ EMANET KASASINA USDT KİLİTLE ]</h3>
    <div class="form-group">
        <label for="aliciAdresi">Alıcı Adresi</label>
        <input type="text" id="aliciAdresi" placeholder="0x..." autocomplete="off">
    </div>
    
    <div class="form-group">
        <label id="miktarLabel" for="miktarInput">Gönderilecek Miktar (USDT)</label>
        <input type="text" id="miktarInput" value="10" placeholder="10">
    </div>
    
    <div class="form-group">
        <label for="sureInput">Emanet Süresi (Saniye Cinsinden)</label>
        <input type="text" id="sureInput" value="3600" placeholder="Örn: 3600 (1 Saat)">
    </div>
    
    <button class="btn-action" onclick="createTransaction()">2. BLOCKCHAIN KİLİDİNİ VUR</button>
    
    <h3>[ KASADAN PARAYI CÜZDANA ÇEK ]</h3>
    <div class="form-group">
        <label for="islemIdInput">Onaylanacak İşlem ID (Takip Numarası)</label>
        <input type="text" id="islemIdInput" placeholder="Örn: 0">
    </div>
    
    <button class="btn-withdraw" onclick="completeTransaction()">3. ALICI OLARAK ONAYLA VE MÜHRÜ VUR</button>
    
    <h3>[ BLOCKCHAIN KASA DURUMU SORGULA ]</h3>
    <div class="form-group">
        <label for="sorguIdInput">Sorgulanacak İşlem ID</label>
        <input type="text" id="sorguIdInput" placeholder="Örn: 0">
    </div>
    
    <button class="btn-query" onclick="checkTransactionStatus()">KASA DURUMUNU CANLI SORGULA</button>
    
    <div id="sorguSonuc" class="status-panel" style="display: none;"></div>
    
    <div id="logKutusu" class="log-box">[13:30:00] > Sistem mevcut sözleşmeye (v4) indeks kalibrasyonuyla bağlandı abi.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>

<script>
    // Senin çalışan asıl kontrat adresin sabit abi, dokunmuyoruz.
    const rawContractAddress = "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A"; 
    
    // Solidity public mapping yapısının dışarı fırlattığı ham çıktı şeması
    const contractABI = [
        "function emanetOlustur(address _alici, uint256 _miktar, uint256 _sureSaniye) external",
        "function aliciOnayVer(uint256 _id) external",
        "function otonomIadeTetikle(uint256 _id) external",
        "function islemler(uint256) public view returns (address, address, uint256, uint256, bool, bool)"
    ];

    const contractAddresses = {
        "0x13882": rawContractAddress, "0x89": rawContractAddress, "0x38": rawContractAddress
    };

    let provider;
    let signer;
    let contract;

    function handleNetworkChange() {
        logMesaji(`Sistem otonom USDT modunda hazır abi.`, true);
    }

    async function switchNetwork(targetChainId) {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: targetChainId }],
            });
            return true;
        } catch (switchError) {
            logMesaji("Ağ değiştirme talebi cüzdan tarafından reddedildi.");
            return false;
        }
    }

    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const targetChainId = document.getElementById('networkSelect').value;
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

                if (currentChainId !== targetChainId) {
                    const success = await switchNetwork(targetChainId);
                    if (!success) return; 
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const walletAddress = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                
                const activeContractAddress = contractAddresses[targetChainId];
                const temizKontratAdresi = ethers.utils.getAddress(activeContractAddress.toLowerCase());
                contract = new ethers.Contract(temizKontratAdresi, contractABI, signer);
                
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerText = `HAT BAĞLANDI: ${walletAddress.substring(0, 6).toUpperCase()}...`;
                connectBtn.style.backgroundColor = '#28a745';
                
                logMesaji(`Cüzdan hattı başarıyla bağlandı abi.`, true);
            } catch (error) {
                logMesaji("Cüzdan bağlantısı reddedildi abi.");
            }
        } else {
            logMesaji("MetaMask bulunamadı abi.");
        }
    }

    if (typeof window.ethereum !== 'undefined') {
        window.ethereum.on('chainChanged', (chainId) => {
            logMesaji("Cüzdandan ağ değişti, vites tazeleniyor...", true);
            const select = document.getElementById('networkSelect');
            if([...select.options].some(option => option.value === chainId)) {
                select.value = chainId;
                handleNetworkChange();
            }
            connectWallet();
        });
    }

    async function createTransaction() {
        logMesaji("Emanet kaydı hazırlanıyor...", true);
        try {
            const aliciRaw = document.getElementById('aliciAdresi').value.trim();
            let miktarRaw = document.getElementById('miktarInput').value.trim();
            const sureRaw = document.getElementById('sureInput').value.trim();

            miktarRaw = miktarRaw.replace(',', '.');
            if (!aliciRaw || !miktarRaw || isNaN(parseFloat(miktarRaw)) || !sureRaw || isNaN(parseInt(sureRaw))) {
                logMesaji("İŞLEM İPTAL: Lütfen alanları eksiksiz doldur abi.");
                return;
            }

            const alici = ethers.utils.getAddress(aliciRaw.toLowerCase());
            if (!signer || !contract) { logMesaji("İŞLEM İPTAL: Önce cüzdanı bağla abi."); return; }

            const miktarWei = ethers.utils.parseUnits(miktarRaw, 6); 
            const sureSaniye = parseInt(sureRaw);

            logMesaji("MetaMask onay penceresi tetikleniyor...", true);
            const tx = await contract.emanetOlustur(alici, miktarWei, sureSaniye);
            logMesaji("Emanet blockchain ağına gönderildi! Onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: Emanet kaydı blockchain kasasına kilitlendi abi!", true);
        } catch (error) {
            console.error(error);
            logMesaji("TEKNİK ARIZA: " + (error.message ? error.message.substring(0, 70) : "Hata") + "...");
        }
    }

    async function completeTransaction() {
        logMesaji("Alıcı onay işlemi başlatılıyor...", true);
        try {
            const islemId = document.getElementById('islemIdInput').value.trim();
            if (!islemId || isNaN(parseInt(islemId))) {
                logMesaji("İŞLEM İPTAL: Geçerli bir İşlem ID girin abi.");
                return;
            }
            if (!signer || !contract) { logMesaji("İŞLEM İPTAL: Önce cüzdanı bağla abi."); return; }

            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} onaylanıyor...`, true);
            const tx = await contract.aliciOnayVer(parseInt(islemId));
            logMesaji("Onay talebi blockchain ağına gönderildi...", true);
            await tx.wait();
            logMesaji("BAŞARILI: Alıcı onayı verildi, para hesaba aktarıldı abi!", true);
        } catch (error) {
            console.error(error);
            logMesaji("TEKNİK ARIZA: " + (error.message ? error.message.substring(0, 70) : "Hata") + "...");
        }
    }

    // UYUŞMAZLIĞI SIFIRLAYAN İNDEKS MOTORU
    async function checkTransactionStatus() {
        logMesaji("Blockchain ağından ham veri çekiliyor...", true);
        try {
            const id = document.getElementById('sorguIdInput').value.trim();
            if (id === "" || isNaN(parseInt(id))) {
                logMesaji("İŞLEM İPTAL: Geçerli bir İşlem ID girin abi.");
                return;
            }
            if (!contract) { logMesaji("İŞLEM İPTAL: Önce cüzdan hattını bağla abi."); return; }

            // Ham veriyi çekiyoruz abi
            const txn = await contract.islemler(parseInt(id));
            
            // KESKİN DÖNÜŞÜM: İsimli nesne uyuşmazlığını aşmak için verileri sadece indeks sırasıyla alıyoruz abi
            const gonderen = txn[0].toString();
            const alici = txn[1].toString();
            const miktarWeiMetin = txn[2].toString();
            const bitisZamaniMetin = txn[3].toString();
            const tamamlandi = txn[4];
            const iadeEdildi = txn[5];

            if (gonderen === "0x0000000000000000000000000000000000000000") {
                logMesaji(`SORGULAMA İPTAL: ID: ${id} henüz blockchain üzerinde oluşturulmamış abi.`);
                return;
            }

            const miktarNormal = ethers.utils.formatUnits(miktarWeiMetin, 6);
            const bitisZamani = parseInt(bitisZamaniMetin);
            const kalanSureSaniye = bitisZamani - Math.floor(Date.now() / 1000);
            
            let sureDurumu = "";
            if (tamamlandi || iadeEdildi) {
                sureDurumu = "Süreç Sonlandı";
            } else if (kalanSureSaniye > 0) {
                sureDurumu = `${Math.ceil(kalanSureSaniye / 60)} Dakika Kaldı`;
            } else {
                sureDurumu = "<span style='color:#ffc107;'>Süre Doldu (İadeye Hazır)</span>";
            }

            let durumYazisi = "";
            if (tamamlandi) {
                durumYazisi = "<span style='color:#00ff00; font-weight:bold;'>TAMAMLANDI (Alıcı Çekti)</span>";
            } else if (iadeEdildi) {
                durumYazisi = "<span style='color:#ff3333; font-weight:bold;'>İADE EDİLDİ (Gönderene Döndü)</span>";
            } else {
                durumYazisi = "<span style='color:#007bff; font-weight:bold;'>KASADA AKTİF (Onay Bekliyor)</span>";
            }

            const sonucKutusu = document.getElementById('sorguSonuc');
            sonucKutusu.style.display = "block";
            sonucKutusu.innerHTML = `
                <strong style="color: #ffc107;">ID: ${id} Otonom Kasa Raporu:</strong><br>
                • Gönderen: ${gonderen.substring(0,8)}...${gonderen.substring(34)}<br>
                • Alıcı: ${alici.substring(0,8)}...${alici.substring(34)}<br>
                • Kilitli Tutar: <strong>${miktarNormal} USDT</strong><br>
                • Kalan Süre: <strong>${sureDurumu}</strong><br>
                • Güncel Durum: ${durumYazisi}
            `;
            logMesaji(`ID: ${id} için otonom kasa verisi başarıyla çekildi abi.`, true);
        } catch (error) {
            console.error(error);
            logMesaji("SORGULAMA HATASI: Blockchain verisi çözümlenirken pürüz çıktı.");
        }
    }

    function logMesaji(mesaj, isInfo = false) {
        const logKutusu = document.getElementById('logKutusu');
        const zaman = new Date().toLocaleTimeString('tr-TR');
        const classStyle = isInfo ? 'class="info"' : '';
        logKutusu.innerHTML += `<br><span ${classStyle}>[${zaman}] > ${mesaj}</span>`;
        logKutusu.scrollTop = logKutusu.scrollHeight;
    }
</script>

</body>
</html>
