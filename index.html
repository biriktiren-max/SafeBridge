<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge V5.1 ULTRA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 25px;
        }
        h3 {
            color: #ffc107;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #bbb;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        .btn-connect {
            background-color: #28a745;
            color: white;
        }
        .btn-connect:hover { background-color: #218838; }
        .btn-action {
            background-color: #007bff;
            color: white;
        }
        .btn-action:hover { background-color: #0069d9; }
        .btn-withdraw {
            background-color: #ffc107;
            color: #121212;
        }
        .btn-withdraw:hover { background-color: #e0a800; }
        .log-box {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #ff3333;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 20px;
            white-space: pre-wrap;
        }
        .log-box .info { color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2>SafeBridge V5.1 ULTRA</h2>
    
    <button id="connectButton" class="btn-connect" onclick="connectWallet()">1. CÜZDAN HATTINI BAĞLA</button>
    
    <h3>[ EMANET KASASINA PARA KİLİTLE ]</h3>
    <div class="form-group">
        <label for="aliciAdresi">Alıcı Adresi (Örn: Account 2)</label>
        <input type="text" id="aliciAdresi" placeholder="0x..." autocomplete="off">
    </div>
    
    <div class="form-group">
        <label for="miktarInput">Miktar (POL)</label>
        <input type="text" id="miktarInput" value="0.001" placeholder="0.001">
    </div>
    
    <div class="form-group">
        <label for="guvenlikSifresi">Güvenlik Şifresi (Kasa Kilitleme Şifresi)</label>
        <input type="password" id="guvenlikSifresi" placeholder="••••••••">
    </div>
    
    <button class="btn-action" onclick="createTransaction()">2. BLOCKCHAIN KİLİDİNİ VUR</button>
    
    <h3>[ KASADAN PARAYI CÜZDANA ÇEK ]</h3>
    <div class="form-group">
        <label for="islemIdInput">İşlem Takip Numarası (ID)</label>
        <input type="text" id="islemIdInput" placeholder="Örn: 1">
    </div>
    
    <div class="form-group">
        <label for="cozmeSifresiInput">Kilit Açma Şifresi</label>
        <input type="password" id="cozmeSifresiInput" placeholder="••••••••">
    </div>
    
    <button class="btn-withdraw" onclick="completeTransaction()">3. PARAYI CÜZDANA ÇEK</button>
    
    <div id="logKutusu" class="log-box">[12:00:00] > Sistem montaja hazır abi.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>

<script>
    const rawContractAddress = "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A"; 
    
    const contractABI = [
        "function createTransaction(address _receiver, bytes32 _passwordHash) public payable",
        "function completeTransaction(uint256 _id, string memory _password) public"
    ];

    let provider;
    let signer;
    let contract;

    // 1. CÜZDAN HATTINI BAĞLAMA FONKSİYONU
    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const walletAddress = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                
                const temizKontratAdresi = ethers.utils.getAddress(rawContractAddress.toLowerCase());
                contract = new ethers.Contract(temizKontratAdresi, contractABI, signer);
                
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerText = `HAT BAĞLANDI: ${walletAddress.substring(0, 6).toUpperCase()}...`;
                connectBtn.style.backgroundColor = '#28a745';
                
                logMesaji("Cüzdan hattı başarıyla bağlandı abi.", true);
            } catch (error) {
                logMesaji("Cüzdan bağlantısı reddedildi veya hata oluştu abi.");
                console.error(error);
            }
        } else {
            logMesaji("MetaMask bulunamadı, lütfen eklentiyi kontrol et abi.");
        }
    }

    // 2. BLOCKCHAIN KİLİDİNİ VURMA FONKSİYONU
    async function createTransaction() {
        logMesaji("İşlem başlatılıyor, veriler kontrol ediliyor...", true);
        try {
            const aliciRaw = document.getElementById('aliciAdresi').value.trim();
            let miktarRaw = document.getElementById('miktarInput').value.trim();
            const sifre = document.getElementById('guvenlikSifresi').value;

            miktarRaw = miktarRaw.replace(',', '.');
            
            if (!aliciRaw || !miktarRaw || isNaN(parseFloat(miktarRaw)) || parseFloat(miktarRaw) <= 0 || !sifre) {
                logMesaji("İŞLEM İPTAL: Lütfen tüm alanları eksiksiz ve doğru doldur abi.");
                return;
            }

            const alici = ethers.utils.getAddress(aliciRaw.toLowerCase());

            if (!signer || !contract) {
                logMesaji("İŞLEM İPTAL: Önce 1. adımdan cüzdan hattını bağla abi.");
                return;
            }

            const gonderen = await signer.getAddress();
            if (gonderen.toLowerCase() === alici.toLowerCase()) {
                logMesaji("İŞLEM İPTAL: Alıcı adresi olarak kendi adresini yazamazsın abi.");
                return;
            }

            const passwordHash = ethers.utils.keccak256(ethers.utils.toUtf8Bytes(sifre));
            const miktarWei = ethers.utils.parseEther(miktarRaw);

            logMesaji("MetaMask onay penceresi tetikleniyor, sağ paneli kontrol et abi...", true);

            const tx = await contract.createTransaction(alici, passwordHash, { value: miktarWei });
            logMesaji("İşlem blockchain ağına gönderildi! Onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: 2. Blockchain kilidi vuruldu, para kasaya kilitlendi abi!", true);

        } catch (error) {
            console.error(error);
            let teknikHata = error.message ? error.message : "Bilinmeyen blockchain hatası";
            logMesaji("TEKNİK ARIZA: " + teknikHata.substring(0, 90) + "...");
        }
    }

    // 3. PARAYI CÜZDANA ÇEKME FONKSİYONU
    async function completeTransaction() {
        logMesaji("Para çekme talebi hazırlanıyor...", true);
        try {
            const islemId = document.getElementById('islemIdInput').value.trim();
            const cozmeSifresi = document.getElementById('cozmeSifresiInput').value;

            if (!islemId || isNaN(parseInt(islemId)) || !cozmeSifresi) {
                logMesaji("İŞLEM İPTAL: Lütfen İşlem ID'sini ve Kilit Açma Şifresini gir abi.");
                return;
            }

            if (!signer || !contract) {
                logMesaji("İŞLEM İPTAL: Önce cüzdan hattını bağlamalısın abi.");
                return;
            }

            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} için şifre doğrulanıyor...`, true);

            // Akıllı sözleşmedeki parayı çözme fonksiyonunu tetikliyoruz
            const tx = await contract.completeTransaction(parseInt(islemId), cozmeSifresi);
            logMesaji("Kilit açma talebi ağa gönderildi, onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: Kilit açıldı! Para alıcının cüzdanına tık diye aktarıldı abi!", true);

        } catch (error) {
            console.error(error);
            let teknikHata = error.message ? error.message : "Bilinmeyen blockchain hatası";
            logMesaji("TEKNİK ARIZA: " + teknikHata.substring(0, 90) + "...");
        }
    }

    // LOG SİSTEMİ YARDIMCISI
    function logMesaji(mesaj, isInfo = false) {
        const logKutusu = document.getElementById('logKutusu');
        const zaman = new Date().toLocaleTimeString('tr-TR');
        const classStyle = isInfo ? 'class="info"' : '';
        logKutusu.innerHTML += `<br><span ${classStyle}>[${zaman}] > ${mesaj}</span>`;
        logKutusu.scrollTop = logKutusu.scrollHeight;
    }
</script>

</body>
</html>
