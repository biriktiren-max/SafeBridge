<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge | Blockchain Escrow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --main: #38bdf8; --bg: #0f172a; --card: #1e293b; --success: #10b981; --warning: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; color: var(--main); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        label { display: block; margin-top: 15px; font-size: 0.85rem; color: #94a3b8; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--main); color: #0f172a; }
        .btn-green { background: var(--success); color: white; }
        .status-box { margin-top: 15px; padding: 15px; border-radius: 8px; background: #000; color: var(--warning); font-family: monospace; border-left: 4px solid var(--main); min-height: 90px; white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>SafeBridge <span style="color:var(--success)">V3.9</span></h1>
    <div class="grid">
        <div class="card">
            <h2>📦 Emanet Oluştur</h2>
            <button onclick="connectWallet()" class="btn-blue" id="connBtn">1. CÜZDANI BAĞLA</button>
            <label>Alıcı Adresi:</label>
            <input type="text" id="receiver" value="0x68E77673A76F26e2e5845C9738090C821588D">
            <label>Miktar (POL):</label>
            <input type="text" id="amount" value="0.001">
            <label>Kilitleme Şifresi:</label>
            <input type="text" id="lockPass" placeholder="Örn: 1234">
            <button onclick="createEscrow()" class="btn-blue" style="margin-top:20px; background: #0ea5e9;">2. PARAYI KİLİTLE</button>
        </div>
        <div class="card">
            <h2>🔓 Emaneti Geri Al</h2>
            <label>İşlem ID:</label>
            <input type="number" id="targetId" placeholder="Örn: 0">
            <button onclick="checkEscrowStatus()" class="btn-blue" style="background:#475569">⌛ DURUMU SORGULA</button>
            <label style="margin-top:20px;">Kilit Açma Şifresi:</label>
            <input type="text" id="unlockPass">
            <button onclick="withdrawFunds()" class="btn-green">3. PARAYI ÇEK (Withdraw)</button>
            <div id="logBox" class="status-box">> Hazırız İsmail abi...</div>
        </div>
    </div>
</div>

<script>
    const contractAddress = "0x362C173676C7B3a4D610d9fAE763fe5ab6A42445"; 
    const abi = [
        "function createTransaction(address _receiver, string memory _password, uint256 _lockDurationSeconds) public payable",
        "function completeTransaction(uint256 _id, string memory _password) public",
        "function getTransaction(uint256 _id) public view returns (address sender, address receiver, uint256 amount, uint256 unlockTime, bool isCompleted)"
    ];

    let provider, signer, contract;

    function updateLog(msg) {
        document.getElementById('logBox').innerText = "> " + msg;
    }

    async function connectWallet() {
        if (!window.ethereum) {
            updateLog("HATA: MetaMask yüklü değil abi!");
            return;
        }
        try {
            updateLog("Cüzdan bağlanıyor...");
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const network = await provider.getNetwork();
            
            if (network.chainId !== 80002) {
                updateLog("DİKKAT: MetaMask'tan AMOY ağını seç abi!");
                return;
            }
            
            const userAddr = await signer.getAddress();
            document.getElementById('connBtn').innerText = "BAĞLANDI: " + userAddr.substring(0, 6) + "...";
            updateLog("Cüzdan bağlandı. Marş hazır!");
        } catch (err) {
            updateLog("BAĞLANTI HATASI: " + err.message);
        }
    }

    async function createEscrow() {
        if (!signer) { updateLog("HATA: Önce cüzdanı bağla abi!"); return; }
        try {
            contract = new ethers.Contract(contractAddress, abi, signer);
            const receiver = document.getElementById('receiver').value;
            const amount = document.getElementById('amount').value.replace(',', '.');
            const pass = document.getElementById('lockPass').value;

            if (!pass) { updateLog("HATA: Bir şifre belirle abi!"); return; }

            updateLog("Onay bekleniyor... MetaMask'a bak!");
            const tx = await contract.createTransaction(
                receiver,
                pass,
                600, // 10 dakika kilit
                { value: ethers.utils.parseEther(amount) }
            );
            updateLog("İşlem blockchain'e gönderildi, bekleniyor...");
            await tx.wait();
            updateLog("BAŞARILI! Para kilitlendi.");
        } catch (err) {
            updateLog("HATA: İşlem iptal edildi veya yetersiz bakiye.");
        }
    }

    async function checkEscrowStatus() {
        try {
            const tempProvider = new ethers.providers.Web3Provider(window.ethereum);
            const tempContract = new ethers.Contract(contractAddress, abi, tempProvider);
            const id = document.getElementById('targetId').value;
            const data = await tempContract.getTransaction(id);
            updateLog("ID: " + id + "\nMiktar: " + ethers.utils.formatEther(data.amount) + " POL\nDurum: " + (data.isCompleted ? "Bitti" : "Kilitli"));
        } catch (err) {
            updateLog("HATA: İşlem bulunamadı.");
        }
    }

    async function withdrawFunds() {
        if (!signer) { updateLog("HATA: Önce cüzdanı bağla abi!"); return; }
        try {
            contract = new ethers.Contract(contractAddress, abi, signer);
            const id = document.getElementById('targetId').value;
            const pass = document.getElementById('unlockPass').value;
            updateLog("Cüzdandan onay ver abi...");
            const tx = await contract.completeTransaction(id, pass);
            await tx.wait();
            updateLog("BAŞARILI! Para cüzdana çekildi.");
        } catch (err) {
            updateLog("HATA: Şifre yanlış veya süre dolmadı.");
        }
    }
</script>
</body>
</html>
