<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge V9.5 - TIMEOUT SÜRÜMÜ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 550px; border: 1px solid #333; }
        h2 { text-align: center; color: #007bff; margin-bottom: 25px; }
        h3 { color: #ffc107; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #bbb; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background-color: #2a2a2a; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus, select:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: background 0.3s; }
        .btn-connect { background-color: #28a745; color: white; }
        .btn-connect:hover { background-color: #218838; }
        .btn-action { background-color: #007bff; color: white; }
        .btn-action:hover { background-color: #0069d9; }
        .btn-withdraw { background-color: #ffc107; color: #121212; }
        .btn-withdraw:hover { background-color: #e0a800; }
        .btn-refund { background-color: #dc3545; color: white; }
        .btn-refund:hover { background-color: #c82333; }
        .btn-query { background-color: #17a2b8; color: white; }
        .btn-query:hover { background-color: #138496; }
        .log-box { background-color: #000; border: 1px solid #333; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 13px; color: #bbb; max-height: 150px; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; }
        .report-panel { margin-top: 20px; padding: 18px; border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .report-success { background-color: #0f3d1b; border: 1px solid #1e7e34; color: #72f28f; }
        .report-error { background-color: #3d1113; border: 1px solid #bd2130; color: #f27279; }
        .report-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-family: monospace; }
        .report-table td { padding: 4px 0; vertical-align: top; }
        .report-table td.label { width: 130px; font-weight: bold; color: #ffc107; }
        .report-error .report-table td.label { color: #ff888d; }
        .report-link { color: #00ffff; text-decoration: underline; word-break: break-all; }
        .status-panel { background-color: #2a2a2a; border-radius: 6px; padding: 12px; font-size: 14px; margin-top: 10px; border-left: 4px solid #17a2b8; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>SafeBridge V9.5 PRO</h2>
    
    <button id="connectButton" class="btn-connect" onclick="connectWallet()">1. CÜZDAN HATTINI BAĞLA</button>
    
    <div class="form-group">
        <label for="networkSelect">İşlem Yapılacak Blockchain Ağı</label>
        <select id="networkSelect" onchange="handleNetworkChange()">
            <option value="0x13882" selected>Polygon Amoy Testnet (USDT)</option>
            <option value="0x89">Polygon Mainnet (USDT)</option>
            <option value="0x38">BNB Smart Chain (USDT)</option>
        </select>
    </div>

    <h3>[ EMANET KASASINA USDT KİLİTLE ]</h3>
    <div class="form-group">
        <label for="aliciAdresi">Alıcı Adresi</label>
        <input type="text" id="aliciAdresi" placeholder="0x..." autocomplete="off">
    </div>
    
    <div class="form-group">
        <label id="miktarLabel" for="miktarInput">Gönderilecek Miktar (USDT)</label>
        <input type="text" id="miktarInput" value="10" placeholder="10">
    </div>
    
    <div class="form-group">
        <label for="sureInput">Emanet Süresi (Saniye Cinsinden)</label>
        <input type="text" id="sureInput" value="3600" placeholder="Örn: 3600 (1 Saat)">
    </div>
    
    <button class="btn-action" onclick="createTransaction()">2. BLOCKCHAIN KİLİDİNİ VUR</button>
    
    <h3>[ KASA TRANSFER / İADE EMİRLERİ ]</h3>
    <div class="form-group">
        <label for="islemIdInput">İşlem ID (Takip Numarası)</label>
        <input type="text" id="islemIdInput" placeholder="Örn: 0">
    </div>
    
    <button class="btn-withdraw" onclick="completeTransaction()">3. ALICI OLARAK ONAYLA VE PARAYI ÇEK</button>
    <button class="btn-refund" onclick="refundTransaction()">4. GÖNDEREN OLARAK SÜRESİ DOLANI İADE AL</button>
    
    <h3>[ BLOCKCHAIN KASA DURUMU SORGULA ]</h3>
    <div class="form-group">
        <label for="sorguIdInput">Sorgulanacak İşlem ID</label>
        <input type="text" id="sorguIdInput" placeholder="Örn: 0">
    </div>
    
    <button class="btn-query" onclick="checkTransactionStatus()">KASA DURUMUNU CANLI SORGULA</button>
    
    <div id="sorguSonuc" class="status-panel" style="display: none;"></div>
    <div id="raporPaneli" class="report-panel"></div>
    <div id="logKutusu" class="log-box">[SİSTEM] > Gecikme röleli otonom motor hazır abi.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js" type="text/javascript"></script>

<script script>
    const rawContractAddress = "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A"; 
    const contractABI = [
        "function emanetOlustur(address _alici, uint256 _miktar, uint256 _sureSaniye) external",
        "function aliciOnayVer(uint256 _id) external",
        "function otonomIadeTetikle(uint256 _id) external",
        "function islemler(uint256 id) external view returns (address, address, uint256, uint256, bool, bool)"
    ];
    const contractAddresses = { "0x13882": rawContractAddress, "0x89": rawContractAddress, "0x38": rawContractAddress };

    let provider, signer, contract;

    function handleNetworkChange() { logMesaji(`Sistem otonom USDT modunda hazır abi.`); }

    function raporOlustur(durum, baslik, detaylar = {}) {
        const panel = document.getElementById("raporPaneli");
        panel.style.display = "block";
        panel.className = `report-panel ${durum === 'BAŞARILI' ? 'report-success' : 'report-error'}`;
        let icerik = `<strong>${durum === 'BAŞARILI' ? '✅ İŞLEM BAŞARI RAPORU' : '🚨 OBD ARIZA DETAY RAPORU'}</strong><br><span style="font-size: 16px; font-weight: bold;">${baslik}</span><br><table class="report-table">`;
        for (const [key, val] of Object.entries(detaylar)) { icerik += `<tr><td class="label">• ${key}:</td><td>${val}</td></tr>`; }
        icerik += `</table>`; panel.innerHTML = icerik;
    }

    function arizaCozumle(error, islemTipi) {
        let baslik = "Bilinmeyen Akıllı Sözleşme Kaçağı";
        let detaylar = { "İşlem İstasyonu": islemTipi, "Teşhis Kodu": "ERR_UNKNOWN_BLOCKCHAIN", "Kök Sebebi": "Blockchain düğümünden yanıt alınamadı abi.", "Çözüm Önerisi": "Sorgulama panelinden ID durumunu kontrol edin abi." };
        if (!error) return { baslik, detaylar };
        const errorString = error.toString().toLowerCase();
        const errorMessage = error.message ? error.message.toLowerCase() : "";

        if (errorString.includes("user rejected") || errorMessage.includes("user rejected")) {
            baslik = "Kullanıcı Onay İptal Arızası";
            detaylar = { "İşlem İstasyonu": islemTipi, "Teşhis Kodu": "OBD_USER_REJECTED_4001", "Kök Sebebi": "MetaMask penceresi kullanıcı tarafından kapatıldı.", "Çözüm Önerisi": "Butona tekrar tıklayıp cüzdandan gelen talebe ONAY verin abi." };
        } else if (errorString.includes("insufficient funds") || errorMessage.includes("insufficient funds")) {
            baslik = "Yetersiz Gas (POL/MATIC) Arızası";
            detaylar = { "İşlem İstasyonu": islemTipi, "Teşhis Kodu": "OBD_INSUFFICIENT_GAS_POL", "Kök Sebebi": "Ateşleme için harcanacak POL bakiyesi yetersiz.", "Çözüm Önerisi": "Amoy musluğundan cüzdanınıza taze POL talep edin abi." };
        } else if (errorString.includes("call revert exception") || errorString.includes("reverted")) {
            baslik = "Sözleşme Mantık Kuralları Revert Filtresi";
            detaylar = { "İşlem İstasyonu": islemTipi, "Teşhis Kodu": "OBD_SOLIDITY_REVERT_RULE", "Kök Sebebi": "Süresi dolmuş işleme Alıcı Onayı verilemez veya süresi dolmamış işlem iade edilemez abi.", "Çözüm Önerisi": "Süre durumuna göre buton seçimi yapın abi." };
        }
        if (error.code) detaylar["Cüzdan Hata Kodu"] = error.code;
        raporOlustur("ARIZA/HATA", baslik, detaylar);
    }

    async function switchNetwork(targetChainId) {
        try { await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: targetChainId }] }); return true; }
        catch (switchError) { arizaCozumle(switchError, "Ağ Değiştirme Vitesi"); return false; }
    }

    async function connectWallet() {
        document.getElementById("raporPaneli").style.display = "none";
        if (typeof window.ethereum !== 'undefined') {
            try {
                const targetChainId = document.getElementById('networkSelect').value;
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (currentChainId !== targetChainId) { const success = await switchNetwork(targetChainId); if (!success) return; }
                provider = new ethers.BrowserProvider(window.ethereum); signer = await provider.getSigner();
                const activeContractAddress = contractAddresses[targetChainId];
                const temizKontratAdresi = ethers.getAddress(activeContractAddress.toLowerCase());
                contract = new ethers.Contract(temizKontratAdresi, contractABI, signer);
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerText = `HAT BAĞLANDI: ${signer.address.substring(0, 6).toUpperCase()}...`; connectBtn.style.backgroundColor = '#28a745';
                logMesaji(`Cüzdan hattı başarıyla bağlandı abi.`);
            } catch (error) { arizaCozumle(error, "Cüzdan Bağlantı İstasyonu"); }
        } else { raporOlustur("ARIZA/HATA", "MetaMask Sürücü Eksikliği", { "Teşhis Kodu": "OBD_NO_METAMASK", "Çözüm Önerisi": "Lütfen tarayıcınıza MetaMask kurun abi." }); }
    }

    if (typeof window.ethereum !== 'undefined') { window.ethereum.on('chainChanged', () => { connectWallet(); }); }

    async function createTransaction() {
        document.getElementById("raporPaneli").style.display = "none"; logMesaji("Emanet kaydı hazırlanıyor...");
        try {
            const aliciRaw = document.getElementById('aliciAdresi').value.trim();
            let miktarRaw = document.getElementById('miktarInput').value.trim(); const sureRaw = document.getElementById('sureInput').value.trim();
            miktarRaw = miktarRaw.replace(',', '.');
            if (!aliciRaw || !miktarRaw || isNaN(parseFloat(miktarRaw)) || !sureRaw || isNaN(parseInt(sureRaw))) {
                raporOlustur("ARIZA/HATA", "Form Giriş Hatası", { "Kök Sebebi": "Alanlar eksik veya hatalı girildi abi." }); return;
            }
            const alici = ethers.getAddress(aliciRaw.toLowerCase()); if (!signer || !contract) return;
            const miktarWei = ethers.parseUnits(miktarRaw, 6); const sureSaniye = BigInt(sureRaw);

            logMesaji("MetaMask onay penceresi tetikleniyor...");
            const tx = await contract.emanetOlustur(alici, miktarWei, sureSaniye, { gasLimit: 300000, maxPriorityFeePerGas: ethers.parseUnits("40", "gwei"), maxFeePerGas: ethers.parseUnits("50", "gwei") });
            await tx.wait();
            logMesaji("BAŞARILI: Emanet kaydı blockchain kasasına kilitlendi abi!");
            raporOlustur("BAŞARILI", "Emanet Kasası Kuruldu", { "İşlem": "USDT Emanet Kilitleme" });
        } catch (error) { arizaCozumle(error, "Emanet Kasası Kurma İstasyonu"); }
    }

    async function completeTransaction() {
        document.getElementById("raporPaneli").style.display = "none"; logMesaji("Alıcı onay işlemi başlatılıyor...");
        try {
            const islemId = document.getElementById('islemIdInput').value.trim(); if (!islemId || isNaN(parseInt(islemId))) return; if (!signer || !contract) return;
            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} onaylanıyor...`);
            const tx = await contract.aliciOnayVer(BigInt(islemId), { gasLimit: 250000, maxPriorityFeePerGas: ethers.parseUnits("40", "gwei"), maxFeePerGas: ethers.parseUnits("50", "gwei") });
            await tx.wait();
            logMesaji("BAŞARILI: Para hesaba aktarıldı abi!");
            raporOlustur("BAŞARILI", "Mühür Kilit Açma Başarı Raporu", { "Sonuç": "USDT Alıcıya Aktarıldı" });
            
            // ⭐ GECİKME RÖLESİ: Ağın kendine gelmesi için 5 saniye bekle, sonra otonom sorgula abi!
            logMesaji("Ağ senkronizasyonu için 5 saniye bekleniyor...");
            setTimeout(() => { checkTransactionStatusDirect(islemId); }, 5000);
        } catch (error) { arizaCozumle(error, "Alıcı Onay Verme İstasyonu"); }
    }

    async function refundTransaction() {
        document.getElementById("raporPaneli").style.display = "none"; logMesaji("Otonom iade işlemi başlatılıyor...");
        try {
            const islemId = document.getElementById('islemIdInput').value.trim(); if (!islemId || isNaN(parseInt(islemId))) return; if (!signer || !contract) return;
            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} İade Süreci Başlatıldı...`);
            const tx = await contract.otonomIadeTetikle(BigInt(islemId), { gasLimit: 250000, maxPriorityFeePerGas: ethers.parseUnits("40", "gwei"), maxFeePerGas: ethers.parseUnits("50", "gwei") });
            await tx.wait();
            logMesaji("BAŞARILI: Emanet gönderene iade edildi abi!");
            raporOlustur("BAŞARILI", "Otonom İade Başarıyla Tamamlandı", { "Gerçekleşen İşlem": "Süresi Dolan USDT Gönderene İade Edildi" });
            
            // ⭐ GECİKME RÖLESİ: İade işleminde de 5 saniye bekleme vanası aktif
            logMesaji("Ağ senkronizasyonu için 5 saniye bekleniyor...");
            setTimeout(() => { checkTransactionStatusDirect(islemId); }, 5000);
        } catch (error) { arizaCozumle(error, "Otonom İade Tetikleme İstasyonu"); }
    }

    async function checkTransactionStatus() {
        const idInput = document.getElementById('sorguIdInput').value.trim();
        if (idInput === "" || isNaN(parseInt(idInput))) return;
        checkTransactionStatusDirect(idInput);
    }

    // Saf RPC Call motoru
    async function checkTransactionStatusDirect(idInput) {
        try {
            if (!provider) return;
            const activeChainId = document.getElementById('networkSelect').value;
            const targetContract = contractAddresses[activeChainId];
            const fonksiyonImzasi = "0x22f87a8b"; 
            const abiKodlayici = ethers.AbiCoder.defaultAbiCoder();
            const paketliParametreHex = abiKodlayici.encode(["uint256"], [BigInt(idInput)]);
            const dataPaketi = fonksiyonImzasi + paketliParametreHex.substring(2);

            const hamSonucHex = await provider.call({ to: targetContract, data: dataPaketi });
            if (!hamSonucHex || hamSonucHex === "0x" || hamSonucHex.length < 300) return;

            const safHex = hamSonucHex.substring(2); 
            const gonderenHex = "0x" + safHex.substring(24, 64); const aliciHex = "0x" + safHex.substring(88, 128);   
            const miktarWeiMetin = BigInt("0x" + safHex.substring(128, 192)).toString();
            const bitisZamaniMetin = BigInt("0x" + safHex.substring(192, 256)).toString();
            const tamamlandi = BigInt("0x" + safHex.substring(256, 320)) > 0n;
            const iadeEdildi = BigInt("0x" + safHex.substring(320, 384)) > 0n;

            const gonderen = ethers.getAddress(gonderenHex); const alici = ethers.getAddress(aliciHex);
            if (gonderen === "0x0000000000000000000000000000000000000000") {
                raporOlustur("ARIZA/HATA", "Kayıt Bulunamadı", { "ID No": idInput }); return;
            }

            const miktarNormal = ethers.formatUnits(miktarWeiMetin, 6); const bitisZamani = Number(bitisZamaniMetin);
            const kalanSureSaniye = bitisZamani - Math.floor(Date.now() / 1000);
            
            let sureDurumu = (tamamlandi || iadeEdildi) ? "Süreç Sonlandı" : (kalanSureSaniye > 0 ? `${Math.ceil(kalanSureSaniye / 60)} Dakika Kaldı` : "<span style='color:#ffc107;'>Süre Doldu (İadeye Hazır)</span>");
            let durumYazisi = tamamlandi ? "<span style='color:#00ff00; font-weight:bold;'>TAMAMLANDI (Alıcı Çekti)</span>" : (iadeEdildi ? "<span style='color:#ff3333; font-weight:bold;'>İADE EDİLDİ (Gönderene Döndü)</span>" : "<span style='color:#007bff; font-weight:bold;'>KASADA AKTİF (Onay Bekliyor)</span>");

            const sonucKutusu = document.getElementById('sorguSonuc'); sonucKutusu.style.display = "block";
            sonucKutusu.innerHTML = `<strong style="color: #ffc107;">ID: ${idInput} Otonom Kasa Raporu:</strong><br>• Gönderen: ${gonderen.substring(0,8)}...${gonderen.substring(34)}<br>• Alıcı: ${alici.substring(0,8)}...${alici.substring(34)}<br>• Kilitli Tutar: <strong>${miktarNormal} USDT</strong><br>• Kalan Süre: <strong>${sureDurumu}</strong><br>• Güncel Durum: ${durumYazisi}`;
            logMesaji(`ID: ${idInput} durumu otonom güncellendi.`);
        } catch (error) { arizaCozumle(error, "Canlı Veri Sorgulama İstasyonu"); }
    }

    function logMesaji(mesaj) { const logKutusu = document.getElementById('logKutusu'); const zaman = new Date().toLocaleTimeString('tr-TR'); logKutusu.innerHTML += `<br>[${zaman}] > ${mesaj}`; logKutusu.scrollTop = logKutusu.scrollHeight; }
</script>
</body>
</html>
