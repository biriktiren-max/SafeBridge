<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge V6.0 MULTI-CHAIN</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 25px;
        }
        h3 {
            color: #ffc107;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #bbb;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        .btn-connect {
            background-color: #28a745;
            color: white;
        }
        .btn-connect:hover { background-color: #218838; }
        .btn-action {
            background-color: #007bff;
            color: white;
        }
        .btn-action:hover { background-color: #0069d9; }
        .btn-withdraw {
            background-color: #ffc107;
            color: #121212;
        }
        .btn-withdraw:hover { background-color: #e0a800; }
        .log-box {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #ff3333;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 20px;
            white-space: pre-wrap;
        }
        .log-box .info { color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2>SafeBridge V6.0 MULTI-CHAIN</h2>
    
    <button id="connectButton" class="btn-connect" onclick="connectWallet()">1. CÜZDAN HATTINI BAĞLA</button>
    
    <div class="form-group">
        <label for="networkSelect">İşlem Yapılacak Blockchain Ağı</label>
        <select id="networkSelect" onchange="handleNetworkChange()">
            <option value="0x89">Polygon Mainnet (MATİC / POL)</option>
            <option value="0x13882" selected>Polygon Amoy Testnet (POL)</option>
            <option value="0x1">Ethereum Mainnet (ETH)</option>
            <option value="0x38">BNB Smart Chain Mainnet (BNB)</option>
            <option value="0xa86a">Avalanche C-Chain (AVAX)</option>
            <option value="0xa4b1">Arbitrum One (ETH)</option>
        </select>
    </div>

    <h3>[ EMANET KASASINA PARA KİLİTLE ]</h3>
    <div class="form-group">
        <label for="aliciAdresi">Alıcı Adresi (Örn: Account 2)</label>
        <input type="text" id="aliciAdresi" placeholder="0x..." autocomplete="off">
    </div>
    
    <div class="form-group">
        <label id="miktarLabel" for="miktarInput">Miktar (POL)</label>
        <input type="text" id="miktarInput" value="0.001" placeholder="0.001">
    </div>
    
    <div class="form-group">
        <label for="guvenlikSifresi">Güvenlik Şifresi (Kasa Kilitleme Şifresi)</label>
        <input type="password" id="guvenlikSifresi" placeholder="••••••••">
    </div>
    
    <button class="btn-action" onclick="createTransaction()">2. BLOCKCHAIN KİLİDİNİ VUR</button>
    
    <h3>[ KASADAN PARAYI CÜZDANA ÇEK ]</h3>
    <div class="form-group">
        <label for="islemIdInput">İşlem Takip Numarası (ID)</label>
        <input type="text" id="islemIdInput" placeholder="Örn: 1">
    </div>
    
    <div class="form-group">
        <label for="cozmeSifresiInput">Kilit Açma Şifresi</label>
        <input type="password" id="cozmeSifresiInput" placeholder="••••••••">
    </div>
    
    <button class="btn-withdraw" onclick="completeTransaction()">3. PARAYI CÜZDANA ÇEK</button>
    
    <div id="logKutusu" class="log-box">[12:00:00] > Sistem çoklu ağ montajına hazır abi.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>

<script>
    // USTA AYARI: Her ağın kendi akıllı sözleşme adres matrisi
    // Şimdilik test için hepsine aynı adresi koydum abi, diğer ağlara deploy ettikçe buraları güncellersin.
    const contractAddresses = {
        "0x13882": "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A", // Polygon Amoy Testnet
        "0x89":    "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A", // Polygon Mainnet
        "0x1":     "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A", // Ethereum Mainnet
        "0x38":    "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A", // BNB Chain
        "0xa86a":  "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A", // Avalanche
        "0xa4b1":  "0x40A42a59a72F571BEE77CE1e3aEAA54d2466986A"  // Arbitrum
    };

    // Ağların para birimi etiketleri
    const networkSymbols = {
        "0x13882": "POL", "0x89": "POL", "0x1": "ETH", "0x38": "BNB", "0xa86a": "AVAX", "0xa4b1": "ETH"
    };

    const contractABI = [
        "function createTransaction(address _receiver, bytes32 _passwordHash) public payable",
        "function completeTransaction(uint256 _id, string memory _password) public"
    ];

    let provider;
    let signer;
    let contract;

    // Siteden ağ değiştirildiğinde etiketleri güncelleyen fonksiyon
    function handleNetworkChange() {
        const selectedNetwork = document.getElementById('networkSelect').value;
        const symbol = networkSymbols[selectedNetwork];
        document.getElementById('miktarLabel').innerText = `Miktar (${symbol})`;
        logMesaji(`Ağ seçimi değiştirildi: Hedef ağ birimi ${symbol} abi.`, true);
    }

    // OTOMATİK AĞ DEĞİŞTİRME VANASI (Bağlantı sorunlarını çözen asıl parça)
    async function switchNetwork(targetChainId) {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: targetChainId }],
            });
            logMesaji("MetaMask başarıyla hedef ağa geçiş yaptı abi.", true);
            return true;
        } catch (switchError) {
            // Eğer ağ MetaMask'ta ekli değilse kullanıcıya ekleme penceresi fırlatır
            if (switchError.code === 4902) {
                logMesaji("Seçilen ağ MetaMask'ta ekli değil, ekleme talebi gönderiliyor...");
                // Buraya ileride ağ ekleme parametreleri (wallet_addEthereumChain) konulabilir.
            }
            logMesaji("Ağ değiştirme işlemi cüzdandan reddedildi abi.");
            return false;
        }
    }

    // 1. CÜZDAN HATTINI BAĞLAMA FONKSİYONU
    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const targetChainId = document.getElementById('networkSelect').value;
                const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

                // HATA ÖNLEYİCİ: Eğer cüzdandaki ağ ile sitede seçilen ağ uyuşmuyorsa otomatik değiştiriyoruz
                if (currentChainId !== targetChainId) {
                    logMesaji("Cüzdan ağı ile seçilen ağ farklı! Otomatik geçiş tetikleniyor...", true);
                    const success = await switchNetwork(targetChainId);
                    if (!success) return; // Ağ değişmediyse montajı durdur
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const walletAddress = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                
                // Seçilen ağa ait doğru kontratı devreye alıyoruz
                const activeContractAddress = contractAddresses[targetChainId];
                const temizKontratAdresi = ethers.utils.getAddress(activeContractAddress.toLowerCase());
                contract = new ethers.Contract(temizKontratAdresi, contractABI, signer);
                
                const connectBtn = document.getElementById('connectButton');
                connectBtn.innerText = `HAT BAĞLANDI: ${walletAddress.substring(0, 6).toUpperCase()}...`;
                connectBtn.style.backgroundColor = '#28a745';
                
                logMesaji(`Cüzdan hattı başarıyla bağlandı. Aktif Kontrat: ${temizKontratAdresi.substring(0,10)}...`, true);
            } catch (error) {
                logMesaji("Cüzdan bağlantısı reddedildi veya hata oluştu abi.");
                console.error(error);
            }
        } else {
            logMesaji("MetaMask bulunamadı, lütfen eklentiyi kontrol et abi.");
        }
    }

    // Cüzdanda ağ elle değiştirilirse sitenin çökmesini önleyen emniyet kilidi
    if (typeof window.ethereum !== 'undefined') {
        window.ethereum.on('chainChanged', (chainId) => {
            logMesaji("Cüzdan ağı değiştirildi! Sistem yenileniyor...", true);
            // Sitedeki seçim kutusunu cüzdana göre otomatik eşitle
            const select = document.getElementById('networkSelect');
            if([...select.options].some(option => option.value === chainId)) {
                select.value = chainId;
                handleNetworkChange();
            }
            connectWallet(); // Hattı taze ağa göre yeniden bağla
        });
    }

    // 2. BLOCKCHAIN KİLİDİNİ VURMA FONKSİYONU
    async function createTransaction() {
        logMesaji("İşlem başlatılıyor, veriler kontrol ediliyor...", true);
        try {
            const aliciRaw = document.getElementById('aliciAdresi').value.trim();
            let miktarRaw = document.getElementById('miktarInput').value.trim();
            const sifre = document.getElementById('guvenlikSifresi').value;

            miktarRaw = miktarRaw.replace(',', '.');
            
            if (!aliciRaw || !miktarRaw || isNaN(parseFloat(miktarRaw)) || parseFloat(miktarRaw) <= 0 || !sifre) {
                logMesaji("İŞLEM İPTAL: Lütfen tüm alanları eksiksiz ve doğru doldur abi.");
                return;
            }

            const alici = ethers.utils.getAddress(aliciRaw.toLowerCase());

            if (!signer || !contract) {
                logMesaji("İŞLEM İPTAL: Önce 1. adımdan cüzdan hattını bağla abi.");
                return;
            }

            const gonderen = await signer.getAddress();
            if (gonderen.toLowerCase() === alici.toLowerCase()) {
                logMesaji("İŞLEM İPTAL: Alıcı adresi olarak kendi adresini yazamazsın abi.");
                return;
            }

            const passwordHash = ethers.utils.keccak256(ethers.utils.toUtf8Bytes(sifre));
            const miktarWei = ethers.utils.parseEther(miktarRaw);

            logMesaji("MetaMask onay penceresi tetikleniyor, sağ paneli kontrol et abi...", true);

            const tx = await contract.createTransaction(alici, passwordHash, { value: miktarWei });
            logMesaji("İşlem blockchain ağına gönderildi! Onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: 2. Blockchain kilidi vuruldu, para kasaya kilitlendi abi!", true);

        } catch (error) {
            console.error(error);
            let teknikHata = error.message ? error.message : "Bilinmeyen blockchain hatası";
            logMesaji("TEKNİK ARIZA: " + teknikHata.substring(0, 90) + "...");
        }
    }

    // 3. PARAYI CÜZDANA ÇEKME FONKSİYONU
    async function completeTransaction() {
        logMesaji("Para çekme talebi hazırlanıyor...", true);
        try {
            const islemId = document.getElementById('islemIdInput').value.trim();
            const cozmeSifresi = document.getElementById('cozmeSifresiInput').value;

            if (!islemId || isNaN(parseInt(islemId)) || !cozmeSifresi) {
                logMesaji("İŞLEM İPTAL: Lütfen İşlem ID'sini ve Kilit Açma Şifresini gir abi.");
                return;
            }

            if (!signer || !contract) {
                logMesaji("İŞLEM İPTAL: Önce cüzdan hattını bağlamalısın abi.");
                return;
            }

            logMesaji(`MetaMask tetikleniyor, ID: ${islemId} için şifre doğrulanıyor...`, true);

            const tx = await contract.completeTransaction(parseInt(islemId), cozmeSifresi);
            logMesaji("Kilit açma talebi ağa gönderildi, onay bekleniyor...", true);
            await tx.wait();
            logMesaji("BAŞARILI: Kilit açıldı! Para alıcının cüzdanına tık diye aktarıldı abi!", true);

        } catch (error) {
            console.error(error);
            let teknikHata = error.message ? error.message : "Bilinmeyen blockchain hatası";
            logMesaji("TEKNİK ARIZA: " + teknikHata.substring(0, 90) + "...");
        }
    }

    // LOG SİSTEMİ YARDIMCISI
    function logMesaji(mesaj, isInfo = false) {
        const logKutusu = document.getElementById('logKutusu');
        const zaman = new Date().toLocaleTimeString('tr-TR');
        const classStyle = isInfo ? 'class="info"' : '';
        logKutusu.innerHTML += `<br><span ${classStyle}>[${zaman}] > ${mesaj}</span>`;
        logKutusu.scrollTop = logKutusu.scrollHeight;
    }
</script>

</body>
</html>
