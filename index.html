<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBridge | Blockchain Escrow V3.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --main: #38bdf8; --bg: #0f172a; --card: #1e293b; --success: #10b981; --warning: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; color: var(--main); text-transform: uppercase; letter-spacing: 1px; }
        .scanner-btn { width: 100%; background: var(--warning); color: #000; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 20px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 10px; color: var(--main); }
        label { display: block; margin-top: 15px; font-size: 0.85rem; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-blue { background: var(--main); color: #0f172a; }
        .btn-blue:hover { opacity: 0.9; }
        .btn-green { background: var(--success); color: white; }
        .status-box { margin-top: 15px; padding: 15px; border-radius: 8px; background: #000; color: var(--warning); font-family: 'Courier New', monospace; border-left: 4px solid var(--main); min-height: 90px; white-space: pre-wrap; font-size: 0.9rem; overflow-x: hidden; }
        #timer-display { text-align: center; font-size: 1.3rem; font-weight: bold; color: var(--main); margin: 10px 0; min-height: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SafeBridge <span style="color:var(--success)">V3.7</span></h1>
    
    <button class="scanner-btn" onclick="scanMyTransactions()">🔍 İŞLEMLERİMİ OTOMATİK BUL (SCANNER)</button>

    <div class="grid">
        <div class="card">
            <h2>📦 Emanet Oluştur</h2>
            <button onclick="connectWallet()" class="btn-blue" id="connBtn">1. Cüzdanı Bağla</button>
            
            <label>Alıcı Adresi:</label>
            <input type="text" id="receiver" placeholder="0x...">
            
            <label>Birim Seçin:</label>
            <select id="currency">
                <option value="ETH">Sepolia ETH</option>
                <option value="POL">POL (Polygon)</option>
                <option value="BNB">BNB (Testnet)</option>
            </select>
            
            <label>Miktar (Nokta kullanın):</label>
            <input type="number" id="amount" placeholder="0.01" value="0.01" step="0.01">
            
            <label>Kilit Şifresi Belirle:</label>
            <input type="text" id="lockPass" placeholder="Örn: 1234">
            
            <button onclick="createEscrow()" class="btn-blue" style="margin-top:20px;">Parayı Kilitle ve Gönder</button>
        </div>

        <div class="card">
            <h2>🔓 Emaneti Geri Al</h2>
            <div id="timer-display"></div>
            
            <label>İşlem ID Numarası:</label>
            <input type="number" id="targetId" placeholder="Örn: 0">
            
            <button onclick="checkEscrowStatus()" class="btn-blue" style="background:#475569">⌛ DURUMU SORGULA</button>
            
            <label style="margin-top:20px;">Kilit Açma Şifresi:</label>
            <input type="text" id="unlockPass" placeholder="Şifreyi girin">
            
            <button onclick="withdrawFunds()" class="btn-green">Cüzdanıma Çek (Withdraw)</button>
            
            <div id="logBox" class="status-box">> Bağlantı bekleniyor abi...</div>
        </div>
    </div>
</div>

<script>
    const contractAddress = "0x53805B737A4358607A6679549fC6D68644e5f762";
    const abi = [
        "function createTransaction(address _receiver, bytes32 _passwordHash, uint256 _unlockTime) public payable",
        "function completeTransaction(uint256 _id, string memory _password) public",
        "function transactions(uint256) public view returns (address sender, address receiver, uint256 amount, bytes32 passwordHash, uint256 unlockTime, bool completed, bool refunded)"
    ];

    let signer;
    let timerInterval;

    function updateLog(msg) {
        document.getElementById('logBox').innerText = "> " + msg;
    }

    async function connectWallet() {
        if (!window.ethereum) return alert("MetaMask yüklü değil!");
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const addr = await signer.getAddress();
            updateLog("Cüzdan Bağlandı:\n" + addr);
            document.getElementById('connBtn').innerText = "✅ Bağlı";
            document.getElementById('receiver').value = addr; 
        } catch (e) { updateLog("Bağlantı başarısız."); }
    }

    async function createEscrow() {
        if (!signer) return alert("Önce cüzdanı bağla abi!");
        try {
            const contract = new ethers.Contract(contractAddress, abi, signer);
            const receiver = document.getElementById('receiver').value.trim();
            const amount = document.getElementById('amount').value.toString();
            const pass = document.getElementById('lockPass').value.trim();

            if(!ethers.utils.isAddress(receiver)) {
                updateLog("HATA: Alıcı adresi geçersiz!");
                return;
            }
            if(!pass) {
                updateLog("HATA: Şifre girmedin abi!");
                return;
            }

            const pHash = ethers.utils.keccak256(ethers.utils.toUtf8Bytes(pass));
            const unlockTime = Math.floor(Date.now() / 1000) + 60; // 1 Dakika Kilit

            updateLog("MetaMask Onayı Bekleniyor...");
            
            const tx = await contract.createTransaction(
                receiver,
                pHash,
                unlockTime,
                { value: ethers.utils.parseEther(amount) }
            );
            
            updateLog("İşlem blokzincirine gönderildi...");
            await tx.wait();
            updateLog("BAŞARILI! Para kilitlendi.\nŞimdi turuncu butona bas.");
        } catch (e) { 
            updateLog("HATA: " + (e.reason || "Onay verilmedi veya bakiye yetersiz.")); 
        }
    }

    async function scanMyTransactions() {
        if (!window.ethereum) return;
        const prov = new ethers.providers.Web3Provider(window.ethereum);
        const contract = new ethers.Contract(contractAddress, abi, prov);
        const accounts = await prov.listAccounts();
        if (accounts.length === 0) return updateLog("Bağlan abi!");
        
        const myAddr = accounts[0].toLowerCase();
        updateLog("İşlemlerin taranıyor...");
        let found = [];
        for (let i = 0; i < 20; i++) {
            try {
                const tx = await contract.transactions(i);
                if (tx.sender.toLowerCase() === myAddr && !tx.completed) {
                    found.push("ID " + i);
                }
            } catch (e) { break; }
        }
        updateLog(found.length > 0 ? "BULUNANLAR:\n" + found.join("\n") : "Açık işlem yok.");
    }

    async function checkEscrowStatus() {
        const id = document.getElementById('targetId').value;
        if (!id) return;
        const prov = new ethers.providers.Web3Provider(window.ethereum);
        const contract = new ethers.Contract(contractAddress, abi, prov);
        try {
            const tx = await contract.transactions(id);
            const timerDiv = document.getElementById('timer-display');
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                const diff = tx.unlockTime.toNumber() - now;
                if(tx.completed) {
                    timerDiv.innerText = "TAMAMLANDI ✅";
                    clearInterval(timerInterval);
                } else if(diff > 0) {
                    timerDiv.innerText = "KALAN: " + diff + " SN";
                } else {
                    timerDiv.innerText = "SÜRE DOLDU ✅";
                    clearInterval(timerInterval);
                }
            }, 1000);
            updateLog("Sorgulandı: ID " + id + "\n" + ethers.utils.formatEther(tx.amount) + " birim kilitli.");
        } catch (e) { updateLog("ID bulunamadı!"); }
    }

    async function withdrawFunds() {
        if (!signer) return;
        try {
            const contract = new ethers.Contract(contractAddress, abi, signer);
            const id = document.getElementById('targetId').value;
            const pass = document.getElementById('unlockPass').value.trim();
            updateLog("Transfer başlatıldı...");
            const tx = await contract.completeTransaction(id, pass);
            await tx.wait();
            updateLog("BAŞARILI! Para cüzdanında.");
        } catch (e) { updateLog("HATA: Şifre yanlış veya süre dolmadı."); }
    }
</script>
</body>
</html>
